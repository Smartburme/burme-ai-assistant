<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password - Burmese AI Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components/auth.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>

  <!-- Custom Scripts -->
  <script src="js/firebaseConfig.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <div class="auth-container">
    <h1>Reset Your Password</h1>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <form id="reset-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <button type="submit" class="btn-primary">Send Reset Link</button>
    </form>
    <div class="auth-links">
      <p>Remember your password? <a href="login.html">Sign In</a></p>
    </div>
    <div id="reset-message" class="success-message"></div>
    <div id="reset-error-message" class="error-message"></div>
  </div>

  <script>
    // Initialize Firebase Auth when page loads
    window.onload = async () => {
      try {
        await initializeFirebaseAndAuth();
        console.log("✅ Firebase Auth Ready on Reset Password Page.");
      } catch (error) {
        const errDiv = document.getElementById("reset-error-message");
        errDiv.textContent = "Firebase Initialization Error: " + (error.message || error);
      }
    };
  </script>
</body>
</html>
