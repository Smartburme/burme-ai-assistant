<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with AI - Burmese AI Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/chat.css"> <!-- Optional specific chat styles -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="js/firebaseConfig.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/chat.js" defer></script>
    <script src="js/gemini.js" defer></script> <!-- For Gemini API calls via Worker -->
    <script src="js/ui.js" defer></script> <!-- For UI interactions -->
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo" onclick="window.location.href='index.html'">Burmese AI</div>
            <nav>
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="#" id="logout-btn">Logout</a></li>
                </ul>
            </nav>
            <!-- Optional: Mobile Menu Icon -->
            <div class="menu-icon">&#9776;</div> <!-- Hamburger icon -->
        </div>
    </header>

    <main class="chat-main-container">
        <div id="chat-messages" class="chat-messages-area">
            <!-- Initial bot message -->
            <div class="message bot-message">Hello! How can I help you today?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" class="btn-icon"><i class="fas fa-paper-plane"></i></button>
            <!-- Optional: Image upload button -->
            <button id="upload-img-btn" class="btn-icon"><i class="fas fa-image"></i></button>
            <!-- Video upload would require a different input type and more complex handling -->
        </div>
    </main>

    <footer>
        <p>&copy; 2023 Burmese AI Assistant</p>
    </footer>
</body>
</html>
