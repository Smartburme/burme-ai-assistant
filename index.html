<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmese AI Assistant - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="js/firebaseConfig.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="login-container">
        <h1>Burmese AI Assistant</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">အီးမေးလ်</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">စကားဝှက်</label>
                <input type="password" id="password" required>
            </div>
            <div id="login-error-message" class="error-message"></div>
            <button type="submit">ဝင်ရောက်ရန်</button>
        </form>
    </div>
</body>
</html>
