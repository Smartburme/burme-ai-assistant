<!-- In the <head> of index.html -->
<script src="js/firebaseConfig.js" defer></script>
<script src="js/auth.js" defer></script>

<!-- In the <body> of index.html -->
<script>
    window.onload = async () => {
        // Wait for Firebase to be initialized and auth service to be ready
        try {
            // First, ensure Firebase app is initialized and auth is accessible
            await initializeAuth(); // Call the initialization function if not globally available

            // Then check the authentication state
            const user = await checkAuthState(); // Assuming checkAuthState is available globally or exported
            if (user) {
                window.location.href = 'mainchat.html';
            } else {
                window.location.href = 'login.html';
            }
        } catch (error) {
            console.error("Initialization or Auth check error:", error);
            document.querySelector('.loading-container').innerHTML = '<p>Error loading application. Please try again later.</p>';
        }
    };
</script>
