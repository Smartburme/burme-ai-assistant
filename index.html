<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmese AI Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Required for Firebase initialization -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <!-- Your custom scripts -->
    <script src="js/firebaseConfig.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <script>
        window.onload = async () => {
            // Ensure Firebase is initialized before checking auth state
            // auth.js should handle initialization, this just waits for it.
            // The checkAuthState function in auth.js returns a Promise
            await checkAuthState().then((user) => {
                if (user) {
                    window.location.href = 'mainchat.html';
                } else {
                    window.location.href = 'login.html';
                }
            }).catch((error) => {
                console.error("Auth check error:", error);
                document.querySelector('.loading-container').innerHTML = '<p>Error loading application. Please try again later.</p>';
            });
        };
    </script>
</body>
</html>
