<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Burme AI</title>
  <link rel="icon" href="assets/icon.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <!-- App Scripts -->
  <script src="js/firebaseConfig.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Burme AI <br> Assistant</div>
  </div>

  <script>
    window.onload = async () => {
      try {
        await initializeFirebaseAndAuth();
        const user = await checkAuthState();

        if (user) {
          window.location.href = 'mainchat.html';
        } else {
          window.location.href = 'login.html';
        }
      } catch (err) {
        const container = document.querySelector('.loading-container');
        container.innerHTML = `<p style="color:red;">App Error: ${err.message || err}</p>`;
      }
    };
  </script>
</body>
</html>
